services:
  openmoss:
    image: ghcr.io/uluckyxh/openmoss:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openmoss
    ports:
      - "${OPENMOSS_PORT:-6565}:6565"
    environment:
      OPENMOSS_CONFIG: /data/config/config.yaml
    volumes:
      - ./data:/app/data
      - ./docker-data/config:/data/config
      - ./docker-data/static:/app/static
      # 如果 OpenClaw 和 OpenMOSS 在同一台机器，取消注释以共享工作目录
      # - ./workspace:/workspace
    restart: unless-stopped

